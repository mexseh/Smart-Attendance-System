<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Student Dashboard</title>

    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/student.css">
</head>

<body>

    <div class="main">

        <!-- TOPBAR -->

        <div class="topbar">

            <h2>
                Welcome, <span id="studentName"></span> 👋
            </h2>

            <button id="logoutBtn">
                Logout
            </button>

        </div>


        <!-- STATS -->

        <div class="stats">

            <div class="card stat">
                <h3 id="attendancePercent">78%</h3>
                <p>Attendance</p>
            </div>

            <div class="card stat">
                <h3 id="classesAttended">42</h3>
                <p>Classes Attended</p>
            </div>

            <div class="card stat">
                <h3 id="classesMissed">12</h3>
                <p>Classes Missed</p>
            </div>

        </div>


        <!-- QUICK ACTIONS -->

        <div class="actions">

            <div class="card action-card">

                <h3>Scan Attendance</h3>

                <p>
                    Scan the QR code shown by your teacher.
                </p>

                <button id="scanBtn" class="btn scan-btn">
                    Scan Attendance QR
                </button>

            </div>


            <div class="card action-card">

                <h3>View Attendance</h3>

                <p>
                    Check your attendance records.
                </p>

                <button id="attendanceBtn" class="btn history-btn">
                    View My Attendance
                </button>

            </div>

        </div>


        <!-- RECENT ATTENDANCE -->

        <div class="card">

            <h3>Recent Attendance</h3>

            <table>

                <thead>
                    <tr>
                        <th>Subject</th>
                        <th>Date</th>
                        <th>Status</th>
                        <th>Time</th>
                    </tr>
                </thead>

                <tbody id="attendanceTable">

                    <!-- JS will populate -->

                </tbody>

            </table>

        </div>

    </div>


    <script src="../js/auth-check.js"></script>
    <script src="../js/student-dashboard.js"></script>

</body>

</html>
